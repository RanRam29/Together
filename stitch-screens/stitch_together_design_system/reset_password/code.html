                    "fontFamily": {

            },
        }

<style>
        body {
            background-color: #FBFAF7;
            font-family: 'Rubik', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .paper-layer {
            position: relative;
            background: #ffffff;
            border: 1px solid #E5E2DA;
        }
    </style>
</head>
<body class="flex flex-col min-h-screen text-on-surface">
<!-- Top App Bar (Shared Component Logic) -->
<header class="w-full top-0 flex items-center justify-between px-container-padding h-14 w-full bg-background transition-opacity duration-200">
<button aria-label="חזרה" class="flex items-center justify-center w-10 h-10 hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined text-primary">arrow_forward</span>
</button>
<div class="flex-1 flex justify-center">
<img alt="Together Logo" class="h-8 w-auto object-contain" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDfLOIbEDQslWLPV6GqXgdc0cxndluKRrdku469vKOyUK0la53AaXlyzjH93subeNQBkRr2yVTnGCmK8Tf1UxyUAhPHDdkEXASU4dbVHeCioVSJtLtdIpZtJFz_hiEqDDjJj2IWK0yZSeVH7LoouoBGqpjhN-7Nzrwn04felgOJFJoODME9U12-xS8Sc0eOTOOAFzkofvrlssZ9z-Ve08kJpXzlEhfS5yjM1RNhD4DZpFGM-Qc8L2eWn-Dj9SdsupI9rijwheeynxnG"/>
</div>
<div class="w-10"></div> <!-- Spacer for centering logo -->
</header>
<!-- Main Content -->
<main class="flex-1 flex flex-col px-container-padding pt-xl pb-lg max-w-md mx-auto w-full">
<!-- Screen Header -->
<div class="mb-xl text-right">
<p class="font-label-md text-label-md text-outline mb-base">אבטחה</p>
<h1 class="font-headline-md text-headline-md text-on-surface mb-sm">איפוס סיסמה</h1>
<p class="font-body-md text-body-md text-on-surface-variant">אנא בחרו סיסמה חדשה ומאובטחת עבור החשבון שלכם.</p>
</div>
<!-- Form Section -->
<form class="space-y-lg flex-1">
<!-- New Password Field -->
<div class="space-y-sm">
<label class="font-label-md text-label-md text-on-surface-variant block" for="new_password">סיסמה חדשה</label>
<div class="relative">
<input class="w-full h-[52px] px-md py-sm bg-surface-container-lowest border border-outline-variant rounded-[14px] text-body-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder:text-outline-variant text-right" id="new_password" placeholder="הזינו סיסמה חדשה" type="password"/>
<button class="absolute left-4 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors" onclick="togglePassword('new_password', this)" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Confirm Password Field -->
<div class="space-y-sm">
<label class="font-label-md text-label-md text-on-surface-variant block" for="confirm_password">אימות סיסמה</label>
<div class="relative">
<input class="w-full h-[52px] px-md py-sm bg-surface-container-lowest border border-outline-variant rounded-[14px] text-body-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder:text-outline-variant text-right" id="confirm_password" placeholder="הזינו את הסיסמה שוב" type="password"/>
<button class="absolute left-4 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors" onclick="togglePassword('confirm_password', this)" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Security Requirements (Micro-interaction indicator) -->
<div class="p-md paper-layer rounded-xl space-y-sm">
<div class="flex items-center gap-2 text-secondary">
<span class="material-symbols-outlined text-[18px]">check_circle</span>
<span class="font-label-sm text-label-sm">לפחות 8 תווים</span>
</div>
<div class="flex items-center gap-2 text-outline">
<span class="material-symbols-outlined text-[18px]">radio_button_unchecked</span>
<span class="font-label-sm text-label-sm">שילוב של אותיות ומספרים</span>
</div>
</div>
</form>
<!-- Action Footer -->
<div class="mt-xl space-y-md">
<button class="w-full h-[52px] bg-primary text-on-primary font-label-md text-label-md rounded-[14px] shadow-sm active:scale-[0.98] transition-transform flex items-center justify-center gap-2">
<span>שמירת סיסמה</span>
<span class="material-symbols-outlined text-[20px]">lock_reset</span>
</button>
<div class="flex justify-center py-base">
<a class="font-label-md text-label-md text-primary flex items-center gap-1 hover:underline decoration-2 underline-offset-4" href="#">
<span class="material-symbols-outlined text-[18px]">arrow_back</span>
<span>חזרה להתחברות</span>
</a>
</div>
</div>
</main>
<!-- Subtle atmospheric decoration (Vanilla JS interaction for background feel) -->
<div class="fixed -bottom-20 -right-20 w-64 h-64 bg-primary/5 blur-[100px] pointer-events-none rounded-full" id="glow"></div>
<script>
        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector('.material-symbols-outlined');
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.innerText = 'visibility_off';
                icon.classList.add('text-primary');
            } else {
                input.type = 'password';
                icon.innerText = 'visibility';
                icon.classList.remove('text-primary');
            }
        }

        // Micro-interaction for feedback
        document.querySelector('button.bg-primary').addEventListener('click', function() {
            this.innerHTML = '<span class="animate-spin material-symbols-outlined text-[20px]">progress_activity</span> <span>מעדכן...</span>';
            setTimeout(() => {
                this.innerHTML = '<span class="material-symbols-outlined text-[20px]">check</span> <span>הסיסמה עודכנה בהצלחה</span>';
                this.classList.replace('bg-primary', 'bg-secondary');
            }, 1500);
        });
    </script>
</body></html>
