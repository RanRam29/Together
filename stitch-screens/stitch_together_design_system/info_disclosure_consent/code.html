<body class="flex flex-col min-h-screen bg-background dark:bg-background">
<!-- TopAppBar -->
<header class="w-full top-0 bg-background dark:bg-background flat no shadows z-50">
<div class="flex items-center justify-between px-container-padding h-14 w-full">
<button class="text-primary dark:text-primary-fixed hover:opacity-80 transition-opacity duration-200">
<span class="material-symbols-outlined">arrow_forward</span>
</button>
<h1 class="font-headline-sm text-headline-sm text-primary dark:text-primary-fixed">אישור חשיפת מידע</h1>
<div class="w-6 h-6"></div> <!-- Spacer for centering -->
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow px-container-padding py-md flex flex-col gap-xl">
<!-- Illustration & Intro -->
<section class="flex flex-col items-center text-center gap-md">
<div class="w-24 h-24 bg-surface-container-high rounded-full flex items-center justify-center mb-2 shadow-sm">
<span class="material-symbols-outlined text-4xl text-primary" style="font-variation-settings: 'FILL' 1;">shield_person</span>
</div>
<p class="font-body-md text-body-md text-on-surface">
                אנחנו שומרים על הפרטיות שלכם. רק אחרי האישור שלך, המידע המפורט יהיה גלוי למשלבת.
            </p>
</section>
<!-- Information Card -->
<section class="bg-surface-container-lowest border border-outline-variant rounded-[14px] p-md shadow-sm">
<h2 class="font-label-md text-label-md text-primary mb-sm font-bold">עם האישור, דנה תקבל גישה ל:</h2>
<ul class="flex flex-col gap-sm">
<li class="flex items-start gap-sm">
<span class="material-symbols-outlined text-secondary text-sm mt-[2px]">check_circle</span>
<span class="font-body-md text-body-md text-on-surface-variant">שם מלא של הילד</span>
</li>
<li class="flex items-start gap-sm">
<span class="material-symbols-outlined text-secondary text-sm mt-[2px]">check_circle</span>
<span class="font-body-md text-body-md text-on-surface-variant">אבחנה וצרכים מיוחדים</span>
</li>
<li class="flex items-start gap-sm">
<span class="material-symbols-outlined text-secondary text-sm mt-[2px]">check_circle</span>
<span class="font-body-md text-body-md text-on-surface-variant">פרטי קשר לתיאום פגישה</span>
</li>
</ul>
</section>
<!-- Confirmation Checkbox -->
<section class="flex items-start gap-sm mt-auto mb-lg">
<div class="relative flex items-center mt-1">
<input class="peer h-5 w-5 cursor-pointer appearance-none rounded-sm border-2 border-outline-variant transition-all checked:border-primary checked:bg-primary hover:shadow-md" id="confirm-share" type="checkbox"/>
<span class="absolute text-on-primary opacity-0 peer-checked:opacity-100 pointer-events-none top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2">
<span class="material-symbols-outlined text-sm font-bold" style="font-variation-settings: 'wght' 700;">check</span>
</span>
</div>
<label class="font-body-md text-body-md text-on-surface cursor-pointer select-none" for="confirm-share">
                אני מאשר/ת את שיתוף המידע עם דנה לצורך תהליך ההיכרות
            </label>
</section>
</main>
<!-- Footer Action -->
<footer class="px-container-padding pb-xl pt-sm bg-background">
<button class="w-full h-[52px] bg-primary text-on-primary font-headline-sm text-headline-sm rounded-[14px] hover:opacity-90 active:bg-primary-container transition-colors shadow-sm">

        </button>
