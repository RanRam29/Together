<script>
        // Auto-focus next input field for OTP
        const inputs = document.querySelectorAll('.otp-input');
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.inputType !== 'deleteContentBackward' && input.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && input.value.length === 0 && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });

        // Simple button press interaction
        const primaryBtn = document.querySelector('button.bg-primary');
        primaryBtn.addEventListener('click', () => {
            primaryBtn.innerHTML = '<span class="flex items-center justify-center gap-2">מאמת... <span class="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></span></span>';
            setTimeout(() => {
                primaryBtn.innerHTML = 'אימות';
            }, 2000);
        });
    </script>
