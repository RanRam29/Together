<!-- Navigation suppressed as this is a focused editing task -->
<script>
        // Simple character counter
        const textarea = document.getElementById('about-me');
        const counter = textarea.nextElementSibling;
        
        textarea.addEventListener('input', function() {
            const length = this.value.length;
            counter.textContent = `${length}/300 תווים`;
            if (length > 300) {
                counter.classList.add('text-error');
                this.classList.add('border-error');
                this.classList.remove('focus:border-primary', 'focus:ring-primary');
            } else {
                counter.classList.remove('text-error');
                this.classList.remove('border-error');
                this.classList.add('focus:border-primary', 'focus:ring-primary');
            }
        });

        // Simple toggle for availability buttons
        const availButtons = document.querySelectorAll('.overflow-x-auto button');
        availButtons.forEach(btn => {
            btn.addEventListener('click', function() {
                if(this.classList.contains('bg-primary')) {
                    this.classList.remove('bg-primary', 'text-on-primary', 'border-primary');
                    this.classList.add('bg-transparent', 'text-on-surface', 'border-outline-variant');
                } else {
                    this.classList.add('bg-primary', 'text-on-primary', 'border-primary');
                    this.classList.remove('bg-transparent', 'text-on-surface', 'border-outline-variant');
                }
            });
        });
    </script>
