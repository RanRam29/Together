<script>
        // Simple script to handle chip toggling for demonstration
        document.addEventListener('DOMContentLoaded', () => {
            const groups = [
                document.querySelectorAll('div.flex.gap-3 > button'), // Functioning level
                document.querySelectorAll('div.flex.flex-wrap.gap-3 > button') // Communication
            ];

            groups[0].forEach(btn => {
                btn.addEventListener('click', (e) => {
                    groups[0].forEach(b => {
                        b.classList.remove('chip-selected');
                        b.classList.add('chip-unselected');
                    });
                    e.target.classList.remove('chip-unselected');
                    e.target.classList.add('chip-selected');
                });
            });

             groups[1].forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const t = e.currentTarget;
                    if(t.classList.contains('chip-selected')) {
                        t.classList.remove('chip-selected');
                        t.classList.add('chip-unselected');
                        const icon = t.querySelector('.material-symbols-outlined');
                        if(icon) icon.remove();
                    } else {
                        t.classList.remove('chip-unselected');
                        t.classList.add('chip-selected');
                        if(!t.querySelector('.material-symbols-outlined')){
                             t.innerHTML += `<span class="material-symbols-outlined text-[18px]">check</span>`;
                        }
                    }
                });
            });
        });
    </script>
