<script>
        // Simple star rating interaction
        const stars = document.querySelectorAll('#star-rating button');
        const ratingLabel = document.getElementById('rating-label');
        const ratingTexts = {
            1: 'מאתגר מאוד',
            2: 'מעט קשה',
            3: 'בסדר גמור',
            4: 'טוב מאוד',
            5: 'מצוין!'
        };

        stars.forEach(star => {
            star.addEventListener('click', () => {
                const val = parseInt(star.getAttribute('data-star'));
                stars.forEach(s => {
                    const sVal = parseInt(s.getAttribute('data-star'));
                    if (sVal <= val) {
                        s.classList.add('star-active');
                    } else {
                        s.classList.remove('star-active');
                    }
                });
                ratingLabel.textContent = ratingTexts[val];
                ratingLabel.classList.add('animate-pulse');
                setTimeout(() => ratingLabel.classList.remove('animate-pulse'), 500);
            });
        });

        // Form submission prevention for demo
        document.getElementById('daily-log-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> <span>שולח...</span>';
            btn.disabled = true;
            
            setTimeout(() => {
                btn.innerHTML = '<span class="material-symbols-outlined">check_circle</span> <span>נשלח בהצלחה</span>';
                btn.classList.replace('bg-primary-container', 'bg-secondary');
                setTimeout(() => {
                    btn.innerHTML = originalContent;
                    btn.classList.replace('bg-secondary', 'bg-primary-container');
                    btn.disabled = false;
                }, 2000);
            }, 1500);
        });
    </script>
