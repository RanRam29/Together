<!-- Hidden Bottom Nav suppression logic: As per PR_SUPPRESSION, this is a task-focused/onboarding page, so the global bottom nav is excluded -->
<script>
        // Simple micro-interaction for button feedback
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('touchstart', function() {
                this.classList.add('opacity-80');
            });
            button.addEventListener('touchend', function() {
                this.classList.remove('opacity-80');
            });
        });

        // Entrance animation
        window.addEventListener('DOMContentLoaded', () => {
            const cards = document.querySelectorAll('.step-card');
            cards.forEach((card, index) => {
                card.style.opacity = '0';
                card.style.transform = 'translateY(20px)';
                card.style.transition = 'all 0.5s ease';
                card.style.transitionDelay = `${index * 150}ms`;
                
                setTimeout(() => {
                    card.style.opacity = '1';
                    card.style.transform = 'translateY(0)';
                }, 100);
            });
        });
    </script>
