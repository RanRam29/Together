<script>
        function switchTab(tab) {
            const pendingBtn = document.getElementById('tab-pending');
            const approvedBtn = document.getElementById('tab-approved');
            const container = document.getElementById('content-container');

            if (tab === 'pending') {
                pendingBtn.classList.add('tab-active', 'text-primary');
                pendingBtn.classList.remove('text-on-surface-variant');
                approvedBtn.classList.remove('tab-active', 'text-primary');
                approvedBtn.classList.add('text-on-surface-variant');
                
                // Content update logic could go here
            } else {
                approvedBtn.classList.add('tab-active', 'text-primary');
                approvedBtn.classList.remove('text-on-surface-variant');
                pendingBtn.classList.remove('tab-active', 'text-primary');
                pendingBtn.classList.add('text-on-surface-variant');
                
                // Show empty state for approved for demo purposes
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-20 text-center space-y-4">
                        <div class="w-20 h-20 rounded-full bg-surface-container flex items-center justify-center">
                            <span class="material-symbols-outlined text-outline text-4xl">check_circle</span>
                        </div>
                        <div>

                            <p class="font-body-md text-on-surface-variant">המתן למטפלים שיאשרו את הבקשה שלך</p>
                        </div>
                    </div>
                `;
            }
        }
    </script>
