<script>
        function selectRole(role) {
            // Remove active classes from all
            document.querySelectorAll('.role-card').forEach(card => {
                card.classList.remove('role-card-active');
                card.querySelector('.material-symbols-outlined').style.fontVariationSettings = "'FILL' 0, 'wght' 400";
            });

            // Add active class to selected
            const selectedCard = document.getElementById('role-' + role);
            selectedCard.classList.add('role-card-active');
            selectedCard.querySelector('.material-symbols-outlined').style.fontVariationSettings = "'FILL' 1, 'wght' 400";

            // Enable button
            const btn = document.getElementById('continue-btn');
            btn.disabled = false;
            
            // Haptic feedback simulation
            if (window.navigator && window.navigator.vibrate) {
                window.navigator.vibrate(10);
            }
        }

        // Add micro-interaction to button
        document.getElementById('continue-btn').addEventListener('click', function() {
            if (!this.disabled) {
                this.innerHTML = '<span class="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></span>';
                setTimeout(() => {
                    // Logic for navigation would go here
                    alert('נשלח לבחירת תפקיד: ' + (document.querySelector('.role-card-active').id === 'role-parent' ? 'הורה' : 'משלבת'));
                    this.innerHTML = 'המשך <span class="material-symbols-outlined">arrow_back</span>';
                }, 800);
            }
        });
    </script>
