<script>
        // Micro-interaction for filter chips
        const chips = document.querySelectorAll('.flex.overflow-x-auto button');
        chips.forEach(chip => {
            chip.addEventListener('click', () => {
                chips.forEach(c => {
                    c.classList.remove('bg-primary', 'text-white');
                    c.classList.add('bg-white', 'paper-border', 'text-on-surface-variant');
                });
                chip.classList.remove('bg-white', 'paper-border', 'text-on-surface-variant');
                chip.classList.add('bg-primary', 'text-white');
            });
        });
    </script>
